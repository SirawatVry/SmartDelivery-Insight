version: '3.9'
services:
  minio:
    image: minio/minio:latest
    container_name: olist_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5


  minio-init:
    image: minio/mc:latest
    container_name: olist_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/olist-raw;
        mc mb --ignore-existing local/olist-processed;
        echo 'Buckets created';
      "
      restart: "no"
  ingestion:
    build: ./ingestion
    depends_on:
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./data/raw:/data/raw

  transformer:
    build: ./dbt_project
    depends_on:
      ingestion:
        condition: service_completed_successfully
    volumes:
      - ./dbt_project:/dbt_project
      - ./data/duckdb:/data/duckdb
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

volumes:
    minio_data:
      driver: local